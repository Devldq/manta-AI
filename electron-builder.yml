appId: "com.arm.workflow"
productName: "Arm"
copyright: "Copyright © 2026"

directories:
  output: "dist"
  buildResources: "build"

# 包含的文件（极简版：打包完整的项目）
files:
  - "electron/**/*"
  - "package.json"
  - ".next/**/*"
  - "public/**/*"
  - "node_modules/**/*"
  - "!node_modules/.cache/**/*"
  - "!node_modules/.pnpm/**/*"

# 发布配置（GitHub Releases）
publish:
  provider: github
  owner: Devldq
  repo: arm-claw
  releaseType: release

# macOS 配置
mac:
  target:
    - target: "dmg"
      arch: ["arm64"]
  icon: "build/icon.icns"
  category: "public.app-category.developer-tools"
  hardenedRuntime: true
  gatekeeperAssess: false
  # 自动更新需要签名（开发阶段使用 ad-hoc 签名）
  identity: null

# DMG 配置
dmg:
  title: "${productName} ${version}"
  icon: "build/icon.icns"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: "/Applications"

# 禁用 asar（最简单方案）
asar: false
compression: "normal"

# 自动更新配置
