services:
  manta:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${MANTA_PORT:-3000}:3000"
    volumes:
      - manta-data:/data
    environment:
      - MANTA_PORT=3000
      - MANTA_HOST=0.0.0.0
      - MANTA_DATA_DIR=/data
      - NODE_ENV=production
      # LLM 配置（按需设置）
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_BASE_URL=${AI_BASE_URL:-}
      - AI_MODEL=${AI_MODEL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  manta-data:
    driver: local
