name: 前端需求开发全流程
id: plateco-frontend-dev
description: 覆盖环境准备→需求获取→需求理解→技术方案→创建迭代→编码→部署测试环境→提测→影响面分析→巡检→发布构建→线上部署→变更报告，共14个阶段

steps:
  # AI start: Phase 1 - 环境准备
  - id: env_setup
    name: 环境准备检查
    agent: arm-config
    next: requirements_gathering

  # AI: Phase 2-3 - 需求分析（连续执行）
  - id: requirements_gathering
    name: 需求获取与理解
    agent: arm-analyst
    next: technical_design

  # AI: Phase 4 - 技术方案（需人工审批）
  - id: technical_design
    name: 技术方案规划
    agent: arm-architect
    next: design_approval

  # AI: Phase 4 审批节点
  - id: design_approval
    type: human_in_loop
    name: 技术方案审批
    actions:
      approve: create_iteration
      reject: technical_design
    notify: true

  # AI: Phase 5-6 - 开发阶段
  - id: create_iteration
    name: 创建迭代与分支
    agent: arm-dev
    next: coding

  - id: coding
    name: 功能编码开发
    agent: arm-dev
    next: coding_review

  # AI: 编码完成后人工确认
  - id: coding_review
    type: human_in_loop
    name: 代码审查确认
    actions:
      approve: deploy_staging
      reject: coding
    notify: true

  # AI: Phase 7-8 - 并行部署环境
  - id: deploy_staging
    parallel: true
    name: 部署测试环境
    branches:
      - agent: arm-ops
        name: 部署 Staging 环境
      - agent: arm-ops
        name: 部署 PRT 环境
    after_all: submit_test

  # AI: Phase 9 - 提测
  - id: submit_test
    name: 提交测试
    agent: arm-qa
    next: test_approval

  # AI: 提测后等待测试完成
  - id: test_approval
    type: human_in_loop
    name: 测试完成确认
    actions:
      approve: impact_analysis
      reject: submit_test
    notify: true

  # AI: Phase 10-11 - 质量保障（并行）
  - id: impact_analysis
    name: 影响面分析与巡检
    agent: arm-qa
    next: pre_release_check

  # AI: Phase 12 发布前检查
  - id: pre_release_check
    type: human_in_loop
    name: 发布前确认
    actions:
      approve: release_build
      reject: impact_analysis
    notify: true

  # AI: Phase 12-13 - 发布流程
  - id: release_build
    name: 发布构建
    agent: arm-release
    next: online_deploy

  - id: online_deploy
    name: 线上部署
    agent: arm-release
    next: generate_report

  # AI: Phase 14 - 变更报告
  - id: generate_report
    name: 生成变更报告
    agent: arm-review
    notify: true
