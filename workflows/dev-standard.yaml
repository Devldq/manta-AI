name: 需求开发流
id: dev-standard
description: 需求 → 架构方案 → 人工审批 → 开发 → QA+Review 并行 → 打分

steps:
  - id: architecting
    name: 拆解需求 · 编写需求技术方案
    agent: arm-architect
    next: pending_approval
  - id: pending_approval
    name: 审批技术方案
    agent: arm-review
    next: developing
    notify: mac_notification
  - id: developing
    name: 功能开发
    agent: arm-dev
    next: parallel_review
  - id: parallel_review
    parallel: true
    name: 并行评审
    branches:
      - agent: arm-qa
        name: 功能测试
      - agent: arm-review
        name: 代码评审
    after_all: pending_score
  - id: pending_score
    type: human_in_loop
    name: 打分评价
    notify: mac_notification
