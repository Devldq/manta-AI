<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>Manta - Agent OS</title>
    <script>
      (function(){try{var s=localStorage.getItem('manta:theme');if(!s)return;var d=JSON.parse(s);var c=d.config;if(!c)return;var r=document.documentElement;var mode=d.mode||localStorage.getItem('manta:color-mode')||'dark';if(mode==='dark'){r.classList.add('dark');r.classList.remove('light');}else{r.classList.add('light');r.classList.remove('dark');}var keys=['background','surface','surfaceElevated','border','borderSubtle','textPrimary','textSecondary','textMuted','textInverse','accent','accentHover','accentSubtle','emphasis','emphasisHover','success','warning','error','info'];var tokens=['--color-background','--color-surface','--color-surface-elevated','--color-border','--color-border-subtle','--color-text-primary','--color-text-secondary','--color-text-muted','--color-text-inverse','--color-accent','--color-accent-hover','--color-accent-subtle','--color-emphasis','--color-emphasis-hover','--color-status-done','--color-status-pending','--color-status-failed','--color-status-running'];for(var i=0;i<keys.length;i++){if(c[keys[i]])r.style.setProperty(tokens[i],c[keys[i]]);}var rm={'sm':['4px','6px','8px','12px'],'md':['6px','8px','12px','16px'],'lg':['8px','12px','16px','20px'],'xl':['12px','16px','20px','24px']};var rv=rm[c.radius]||rm['md'];r.style.setProperty('--radius-sm',rv[0]);r.style.setProperty('--radius-md',rv[1]);r.style.setProperty('--radius-lg',rv[2]);r.style.setProperty('--radius-xl',rv[3]);if(c.sidebar){r.style.setProperty('--sidebar-bg',c.sidebar.background||'');r.style.setProperty('--sidebar-text',c.sidebar.textPrimary||'');r.style.setProperty('--sidebar-text-secondary',c.sidebar.textSecondary||'');r.style.setProperty('--sidebar-border',c.sidebar.border||'');if(c.sidebar.width)r.style.setProperty('--sidebar-width',c.sidebar.width+'px');if(c.sidebar.collapsedWidth)r.style.setProperty('--sidebar-collapsed-width',c.sidebar.collapsedWidth+'px');}if(c.font&&c.font.family)r.style.setProperty('--font-family',c.font.family);}catch(e){}})();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
