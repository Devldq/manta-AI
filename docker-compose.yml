version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: manta-server
    ports:
      - "3001:3001"
    volumes:
      - manta-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: manta-web
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  manta-data:
    driver: local
