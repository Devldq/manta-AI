id: codeflicker
name: CodeFlicker
runnerId: codeflicker
description: CodeFlicker IDE 内置 Skills 执行器 — Skills 即 sub-agents

# AI: 扫描 CodeFlicker 内置 skills 目录（每个子目录含 SKILL.md 的即为一个 skill/agent）
# 经实际确认路径为 ~/.codeflicker/internal/skills/（含 code-review、help 等 6 个内置 skill）
agentsDirs:
  - ~/.codeflicker/internal/skills

# AI: agent 格式：codeflicker-skill（子目录 + SKILL.md，frontmatter 含 name / description）
agentFormat: codeflicker-skill
