id: openclaw
name: OpenClaw
runnerId: openclaw
description: OpenClaw Agent 执行器，可管理多个具体 Agent（architect / dev / qa 等）

# AI: Manta 扫描此路径列表寻找 agent 定义文件（支持 ~ 展开）
# openclaw 将 agents 存储在 ~/.openclaw/agents/ 目录，每个 agent 一个 yaml 文件
agentsDirs:
  - ~/.openclaw/agents

# AI: agent 文件格式：yaml（openclaw 使用 YAML 配置文件）
agentFormat: yaml
