# 敏感信息检测规则配置
# 用于 Git pre-commit 钩子，在代码提交前检查是否包含敏感信息
version: "1.0"

# 全局设置
global:
  enabled: true                    # 是否启用检查
  exitOnError: true               # 发现敏感信息是否阻止提交
  ignorePatterns:                 # 忽略的文件/目录模式（支持通配符）
    - "node_modules/**"
    - ".next/**"
    - "dist/**"
    - "build/**"
    - "*.lock"
    - "package-lock.json"
    - "pnpm-lock.yaml"
    - "yarn.lock"
    - ".git/**"

# 敏感信息检测规则
# 可以根据项目需求自定义添加或修改规则
rules:
  # 快手相关敏感信息
  - id: "kuaishou-email"
    name: "快手公司邮箱"
    enabled: true
    severity: "high"
    pattern: "@kuaishou\\.com"
    description: "检测到快手公司邮箱地址"
    suggestion: "请移除公司邮箱，使用个人邮箱或占位符（如 example@example.com）"

  - id: "kuaishou-domain"
    name: "快手内网域名"
    enabled: true
    severity: "high"
    pattern: "(corp|internal|intranet)\\.kuaishou\\.com"
    description: "检测到快手内网域名"
    suggestion: "请移除内网域名配置，使用环境变量或配置文件"

  - id: "kuaishou-npm-registry"
    name: "快手内网 npm 镜像源"
    enabled: true
    severity: "medium"
    pattern: "npm\\.corp\\.kuaishou\\.com"
    description: "检测到快手内网 npm 镜像源配置"
    suggestion: "请使用公共 npm 镜像源或在 .npmrc 中配置（已在 .gitignore 中忽略）"

  # API 密钥和令牌
  - id: "api-key"
    name: "API 密钥"
    enabled: true
    severity: "critical"
    pattern: "(api[_-]?key|apikey|api[_-]?secret)\\s*[:=]\\s*['\"]?[a-zA-Z0-9_\\-]{20,}['\"]?"
    description: "检测到疑似 API 密钥"
    suggestion: "请使用环境变量（.env 文件）或密钥管理服务，不要在代码中硬编码密钥"

  - id: "bearer-token"
    name: "Bearer Token"
    enabled: true
    severity: "critical"
    pattern: "bearer\\s+[a-zA-Z0-9_\\-\\.]{20,}"
    description: "检测到 Bearer Token"
    suggestion: "请移除 Token，使用环境变量或密钥管理服务"

  - id: "jwt-token"
    name: "JWT Token"
    enabled: true
    severity: "critical"
    pattern: "eyJ[a-zA-Z0-9_\\-]+\\.eyJ[a-zA-Z0-9_\\-]+\\.[a-zA-Z0-9_\\-]+"
    description: "检测到 JWT Token"
    suggestion: "请移除 JWT Token，不要在代码中硬编码认证信息"

  # 私钥和证书
  - id: "private-key"
    name: "私钥"
    enabled: true
    severity: "critical"
    pattern: "-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----"
    description: "检测到私钥内容"
    suggestion: "⚠️ 严重安全问题！请立即移除私钥，使用密钥管理服务，并考虑轮换密钥"

  - id: "ssh-key"
    name: "SSH 私钥特征"
    enabled: true
    severity: "critical"
    pattern: "(ssh-rsa|ssh-ed25519|ecdsa-sha2-nistp256)\\s+[A-Za-z0-9+/=]{100,}"
    description: "检测到 SSH 密钥"
    suggestion: "请移除 SSH 密钥，使用 SSH agent 或密钥管理工具"

  # 云服务密钥
  - id: "aws-key"
    name: "AWS 访问密钥"
    enabled: true
    severity: "critical"
    pattern: "(AKIA|A3T|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}"
    description: "检测到 AWS 访问密钥"
    suggestion: "⚠️ 严重安全问题！请立即移除并轮换 AWS 密钥，使用 IAM 角色或 AWS Secrets Manager"

  - id: "aws-secret"
    name: "AWS Secret Key"
    enabled: true
    severity: "critical"
    pattern: "aws[_-]?secret[_-]?access[_-]?key\\s*[:=]\\s*['\"]?[A-Za-z0-9/+=]{40}['\"]?"
    description: "检测到 AWS Secret Access Key"
    suggestion: "请立即移除并轮换 AWS Secret Key"

  # 密码
  - id: "password-field"
    name: "密码字段"
    enabled: true
    severity: "high"
    pattern: "(password|passwd|pwd)\\s*[:=]\\s*['\"][^'\"]{8,}['\"]"
    description: "检测到明文密码"
    suggestion: "请移除明文密码，使用环境变量或加密存储"

  - id: "password-in-comment"
    name: "注释中的密码"
    enabled: true
    severity: "high"
    pattern: "(密码|password|pwd|口令)[^a-zA-Z0-9]*[:：=\\s]+[0-9a-zA-Z_@#$%^&*!]{6,}"
    description: "检测到注释或文本中的密码信息"
    suggestion: "请移除明文密码，即使在注释中也不应该包含真实密码"

  - id: "connection-string"
    name: "数据库连接字符串"
    enabled: true
    severity: "high"
    pattern: "(mysql|postgres|mongodb|redis)://[^\\s'\"]+"
    description: "检测到数据库连接字符串"
    suggestion: "请使用环境变量存储数据库连接信息"

  # 内网 IP 和端口（可选，默认关闭）
  - id: "internal-ip"
    name: "内网 IP 地址"
    enabled: false
    severity: "medium"
    pattern: "(10|172\\.(1[6-9]|2[0-9]|3[01])|192\\.168)\\.[0-9]{1,3}\\.[0-9]{1,3}"
    description: "检测到内网 IP 地址"
    suggestion: "请确认是否需要提交内网 IP，建议使用配置文件或环境变量"

  # 手机号和身份证号
  - id: "phone-number"
    name: "中国手机号"
    enabled: false
    severity: "medium"
    pattern: "1[3-9]\\d{9}"
    description: "检测到手机号码"
    suggestion: "请确认是否需要提交真实手机号，建议使用测试数据"

  - id: "id-card"
    name: "身份证号"
    enabled: false
    severity: "high"
    pattern: "[1-9]\\d{5}(19|20)\\d{2}(0[1-9]|1[0-2])(0[1-9]|[12]\\d|3[01])\\d{3}[0-9Xx]"
    description: "检测到身份证号码"
    suggestion: "请移除真实身份证号，使用测试数据"

# 使用说明：
# 1. 修改规则：编辑 rules 数组，添加或修改检测规则
# 2. 禁用规则：设置 enabled: false
# 3. 调整严重程度：severity 可选值为 critical、high、medium、low
# 4. 正则表达式：pattern 字段支持标准正则表达式语法
# 5. 忽略文件：在 global.ignorePatterns 中添加文件或目录模式
#
# 💡 提示：
# - 如需跳过检查，使用：git commit --no-verify
# - 临时禁用检查：设置 global.enabled: false
# - 测试规则：可以使用在线正则工具（如 regex101.com）验证 pattern
